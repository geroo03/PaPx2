<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Puerta a Puerta — Ingresar</title>
  <script src="/env.js"></script>
  <script type="module" src="assets/js/config.js"></script>
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <div class="logo-box">
        <svg width="36" height="36" viewBox="0 0 90 90" fill="none">
          <path d="M10 36 L45 18 L80 36" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
          <rect x="12" y="36" width="30" height="46" rx="4" fill="#fff" opacity=".9" />
          <rect x="48" y="36" width="30" height="46" rx="4" fill="#fff" />
          <circle cx="36" cy="59" r="4" fill="#FF6B35" />
          <circle cx="54" cy="59" r="4" fill="#FF6B35" />
        </svg>
      </div>
      <div class="app-name">Puerta a Puerta</div>
      <div class="app-tag">Tu pedido, ya mismo.</div>
    </div>

    <div class="card">
      <div class="card-title" id="card-title">Bienvenido</div>
      <div class="card-sub" id="card-sub">Elegí tu tipo de acceso para continuar.</div>

      <div class="role-tabs" style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div class="role-tab" id="tab-usuario" onclick="setRole('usuario')">Cliente</div>
        <div class="role-tab active" id="tab-comercio" onclick="setRole('comercio')">Comercio</div>
        <div class="role-tab" id="tab-cadete" onclick="setRole('cadete')">Cadete</div>
      </div>

      <div class="form-group">
        <label class="form-label" id="label-user">Email del comercio</label>
        <input class="form-input" id="input-user" type="email" placeholder="tucorreo@gmail.com" />
      </div>
      <div class="form-group" style="position:relative;">
        <label class="form-label">Contraseña</label>
        <div style="position:relative;">
          <input class="form-input" id="input-pass" type="password" placeholder="••••••••" />
          <button id="toggle-pass" type="button" aria-label="Mostrar contraseña" title="Mostrar contraseña"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:block;"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z" stroke="#333" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="#333" stroke-width="1.4"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none;"><path d="M17.94 17.94A10.94 10.94 0 0112 19c-6 0-10-7-10-7a21.86 21.86 0 012.88-4" stroke="#333" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 1l22 22" stroke="#333" stroke-width="1.6"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">Ingresar</button>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">¿No tenés cuenta?</div><div class="divider-line"></div></div>

      <div class="register-wrap" style="position:relative;">
        <button class="btn-register" id="btn-register" onclick="irARegistro()">Registrarme</button>
        <div id="register-menu" class="is-hidden" style="position:absolute;left:0;right:0;top:56px;padding:8px;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;">
          <button onclick="gotoRegister('comercio')" style="width:100%;padding:10px;border-radius:8px;border:none;background:#FF6B35;color:#fff;font-weight:700;margin-bottom:8px;cursor:pointer;">Registrarme como Comercio</button>
          <button onclick="gotoRegister('cadete')" style="width:100%;padding:10px;border-radius:8px;border:1px solid #eee;background:#fff;color:#333;font-weight:700;margin-bottom:8px;cursor:pointer;">Registrarme como Cadete</button>
          <button onclick="gotoRegister('usuario')" style="width:100%;padding:10px;border-radius:8px;border:1px solid #eee;background:#fff;color:#333;font-weight:700;margin-bottom:8px;cursor:pointer;">Registrarme como Cliente</button>
        </div>
      </div>

      <div class="forgot-link"><a href="#" onclick="olvideClave()">Olvidé mi contraseña</a></div>
    </div>

  </div>

  <script type="module">
  // Ensure runtime env (env.js) is loaded before importing config
  const _env_s = document.createElement('script'); _env_s.src = '/env.js'; document.head.appendChild(_env_s);
  // Use the shared supabase client from assets/js/config.js
  import { supabase as sb } from 'assets/js/config.js';

  const ADMIN_EMAIL = 'gerardoacostafrancario@gmail.com';
  let role = 'comercio';

  function setRole(r) {
    role = r;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + r).classList.add('active');
    document.getElementById('error-msg').classList.add('is-hidden');
    document.getElementById('success-msg').classList.add('is-hidden');
  }

  function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('success-msg').style.display = 'none'; }
  function showSuccess(msg) { const el = document.getElementById('success-msg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('error-msg').style.display = 'none'; }

  async function login() {
    const email = document.getElementById('input-user').value.trim();
    const pass = document.getElementById('input-pass').value;
    const btn = document.getElementById('btn-login');
    if (!email || !pass) { showError('Completá todos los campos.'); return; }
    if (role === 'admin' && email !== ADMIN_EMAIL) { showError('No tenés permisos de administrador.'); return; }
    btn.disabled = true; btn.textContent = 'Ingresando...';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { console.error('DEBUG SUPABASE: comercio signInWithPassword error', error && error.message ? error.message : error); try { alert('Error de Supabase (login comercio): ' + (error?.message || JSON.stringify(error))); } catch (e) { } throw error; }
      showSuccess('✅ Ingreso exitoso. Redirigiendo...');
      setTimeout(() => {
        if (role === 'admin') window.location.href = 'admin.html';
        else if (role === 'cadete') window.location.href = 'cadete.html';
        else if (role === 'usuario') window.location.href = 'cliente/index.html';
        else window.location.href = 'comercio.html';
      }, 1000);
    } catch (e) {
      console.error('DEBUG SUPABASE: comercio login catch', e && e.message ? e.message : e);
      try { alert('Error de Supabase (login comercio): ' + (e && e.message ? e.message : String(e))); } catch (_) { }
      if (e && e.message && (e.message.includes('Invalid login') || e.message.includes('invalid'))) showError('Email o contraseña incorrectos. Verificá tus datos.');
      else if (e && e.message && e.message.includes('Email not confirmed')) showError('Confirmá tu email antes de ingresar. Revisá tu casilla.');
      else showError('Error al ingresar. Intentá de nuevo.');
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }

  function irARegistro() { window.location.href = role === 'cadete' ? 'cadete/registro-cadete.html' : 'registro-comercio.html'; }

  async function olvideClave() { const email = document.getElementById('input-user').value.trim(); if (!email) { showError('Escribí tu email primero.'); return; } try { await sb.auth.resetPasswordForEmail(email); showSuccess('Te enviamos un email para restablecer tu contraseña.'); } catch (e) { console.error('DEBUG SUPABASE: resetPasswordForEmail', e); try { alert('Error de Supabase (reset): ' + (e && e.message ? e.message : String(e))); } catch (_) { } showError('Error al enviar el email. Verificá la dirección.'); } }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  // Session check (defensive)
  try { if (sb && sb.auth && typeof sb.auth.getSession === 'function') { sb.auth.getSession().then(({ data: { session } }) => { if (!session) return; const r = session.user?.user_metadata?.role || null; if (!r) return; if (r === 'admin') window.location.href = 'admin.html'; else if (r === 'cadete') window.location.href = 'cadete.html'; else if (r === 'usuario') window.location.href = 'cliente/index.html'; else window.location.href = 'comercio.html'; }); } } catch (e) { console.warn('session check failed', e); }
  </script>

</body>
</html>
