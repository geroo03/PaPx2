<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin · Alta Embajador</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/env.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Plus Jakarta Sans',system-ui;padding:18px;background:#fbfbfb}label{display:block;margin:8px 0 4px}input{padding:8px;width:100%;box-sizing:border-box}button{margin-top:12px;padding:10px 12px;background:#0b5fff;color:#fff;border:0;border-radius:8px}</style>
</head>
<body>
  <h1>Crear Embajador</h1>
  <p>Este formulario comunica con un endpoint seguro (service role) para crear usuarios tipo embajador.</p>
  <form id="form-crear-embajador">
    <label>Email</label>
    <input id="e-email" type="email" required>
    <label>Nombre</label>
    <input id="e-nombre" type="text">
    <label>Clave provisoria</label>
    <input id="e-pass" type="password" required value="temporal123">
    <button type="submit">Crear Embajador</button>
  </form>
  <div id="result" style="margin-top:12px;color:#333"></div>

  <script>
    // Nota: Debes implementar el endpoint /api/create-embajador que reciba email, password, name
    // y con la SERVICE_ROLE_KEY cree el usuario en Supabase añadiendo raw_user_meta_data.role = 'embajador'.
    const form = document.getElementById('form-crear-embajador');
    const res = document.getElementById('result');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('e-email').value.trim();
      const name = document.getElementById('e-nombre').value.trim();
      const pass = document.getElementById('e-pass').value;
      res.textContent = 'Creando...';
      try{
        const r = await fetch('/api/create-embajador', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password: pass, name})
        });
        const j = await r.json();
        if(!r.ok) throw new Error(j?.message||'Error');
        res.textContent = 'Embajador creado: ' + (j?.user?.email || 'OK');
      }catch(err){ res.textContent = 'Error: ' + (err.message||err); }
    });
  </script>
</body>
</html>
