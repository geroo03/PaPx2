<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<link rel="icon" type="image/jpeg" href="/puertaapuertax.jpg">
<title>Puerta a Puerta X — Acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/env.js"></script>
<script>
  if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase?.createClient) {
    window.sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  }
</script>
<link rel="stylesheet" href="../assets/css/admin-acceso.css">
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo-box">
      <img src="/puertaapuertax.jpg" alt="PaP X" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">
    </div>
    <div class="app-name">Puerta a Puerta X</div>
    <div class="app-tag">Acceso administradores</div>
  </div>

  <div class="card">
    <div class="card-title">Panel de administración</div>
    <div class="card-sub">Acceso restringido. Solo personal autorizado.</div>
    <div class="fg">
      <label class="fl">Email</label>
      <input class="fi" id="email" type="email" placeholder="admin@puertaapuerta.com"/>
    </div>
    <div class="fg">
      <label class="fl">Contraseña</label>
      <input class="fi" id="pass" type="password" placeholder="••••••••"/>
    </div>
    <button class="btn-login" id="btn">Ingresar</button>
    <div class="error-msg" id="err"></div>
    <div class="success-msg" id="ok"></div>
  </div>
</div>

<script type="module" src="../assets/js/main.js"></script>
<script type="module" src="../assets/js/admin-acceso.js"></script>
</body>
</html>
