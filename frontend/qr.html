<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>QR - Puerta a Puerta X</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;font-family:'Plus Jakarta Sans',sans-serif;}
.card{background:#fff;border-radius:24px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:360px;}
.logo{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;overflow:hidden;}
.logo img{width:100%;height:100%;object-fit:cover;}
h2{font-size:20px;font-weight:800;color:#0d0d0d;margin:0 0 4px;}
.sub{font-size:13px;color:#888;margin-bottom:20px;}
#qr-container{margin:0 auto 16px;}
#qr-container img,#qr-container canvas{border-radius:12px;}
.url{font-size:12px;color:#FF6B35;font-weight:700;margin-bottom:8px;}
.hint{font-size:11px;color:#aaa;}
.btn-download{margin-top:16px;background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;}
</style>
</head><body>
<div class="card">
  <div class="logo"><img src="/puertaapuertax.jpg" alt="PaP X"></div>
  <h2>Puerta a Puerta X</h2>
  <div class="sub">Escanea el QR para pedir</div>
  <div id="qr-container"></div>
  <div class="url">pa-px2.vercel.app</div>
  <div class="hint">Conectamos. Entregamos. Solucionamos.</div>
  <button class="btn-download" onclick="downloadQR()">Descargar QR</button>
</div>
<script>
var qr = qrcode(0, 'M');
qr.addData('https://pa-px2.vercel.app');
qr.make();
var container = document.getElementById('qr-container');
var img = document.createElement('img');
img.src = qr.createDataURL(8, 4);
img.style.width = '220px';
img.style.height = '220px';
container.appendChild(img);
function downloadQR(){
  var a=document.createElement('a');
  a.href=img.src;
  a.download='qr-puerta-a-puerta-x.png';
  a.click();
}
</script>
</body></html>
