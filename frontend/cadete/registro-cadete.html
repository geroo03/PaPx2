<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/jpeg" href="/puertaapuertax.jpg">
  <title>Puerta a Puerta X — Cadete</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/env.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px}
    .container{width:100%;max-width:420px;text-align:center}
    .logo{width:64px;height:64px;border-radius:16px;background:#FF6B35;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 6px 24px rgba(255,107,53,.4)}
    h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px}
    .sub{font-size:14px;color:#888;margin-bottom:36px;line-height:1.5}
    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#1a1a1a;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .btn-google:hover{box-shadow:0 6px 24px rgba(0,0,0,.3)}
    .btn-google:active{transform:scale(.98)}
    .btn-google:disabled{opacity:.6;cursor:not-allowed}
    .btn-google svg{flex-shrink:0}
    .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#555;font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#333}
    .btn-email{width:100%;background:transparent;color:#888;border:1.5px solid #333;border-radius:14px;padding:14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s}
    .btn-email:hover{border-color:#666;color:#ccc}
    .note{font-size:12px;color:#555;margin-top:28px;line-height:1.6}
    .error-msg{background:#2a1010;color:#ff6b6b;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-top:16px;display:none}
    .loader{display:none;justify-content:center;margin-top:16px}
    .loader::after{content:'';width:24px;height:24px;border:3px solid #333;border-top-color:#FF6B35;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* email form */
    .email-form{display:flex;flex-direction:column;gap:12px;text-align:left}
    .email-form input{width:100%;background:#1a1a1a;color:#fff;border:1.5px solid #333;border-radius:12px;padding:14px 16px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
    .email-form input:focus{border-color:#FF6B35}
    .email-form input::placeholder{color:#555}
    .btn-registrar{width:100%;background:#FF6B35;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s}
    .btn-registrar:hover{opacity:.9}
    .btn-registrar:disabled{opacity:.5;cursor:not-allowed}
    .confirm-box{background:#0f2a1a;border:1.5px solid #1a5c30;border-radius:14px;padding:20px;text-align:center;display:none}
    .confirm-box .icon{font-size:36px;margin-bottom:10px}
    .confirm-box p{color:#aee;font-size:14px;line-height:1.6}
    .confirm-box strong{color:#4dbb70}
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <img src="/puertaapuertax.jpg" alt="PaP X" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">
  </div>

  <h1>Unite como Cadete</h1>
  <p class="sub">Empezá a repartir y ganar con Puerta a Puerta X.</p>

  <div style="margin-bottom:24px;text-align:left;">
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:12px;color:#888;line-height:1.5;">
      <input type="checkbox" id="chk-tyc-cadete" style="margin-top:3px;accent-color:#FF6B35;width:16px;height:16px;flex-shrink:0;">
      Acepto los <a href="/legal.html" target="_blank" style="color:#FF6B35;font-weight:600;text-decoration:none;">terminos y condiciones</a> y la <a href="/legal.html" target="_blank" style="color:#FF6B35;font-weight:600;text-decoration:none;">politica de privacidad</a>
    </label>
  </div>

  <button class="btn-google" id="btn-google" onclick="loginConGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09A6.97 6.97 0 015.5 12c0-.72.13-1.42.34-2.09V7.07H2.18A11 11 0 001 12c0 1.78.43 3.46 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continuar con Google
  </button>

  <div class="divider">o registrate con email</div>

  <div class="email-form" id="email-form">
    <input type="email" id="inp-email" placeholder="Tu email" autocomplete="email">
    <input type="password" id="inp-pass" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password">
    <input type="password" id="inp-pass2" placeholder="Repetir contraseña" autocomplete="new-password">
    <button class="btn-registrar" id="btn-registrar" onclick="registrarConEmail()">Crear cuenta como Cadete</button>
  </div>

  <div class="confirm-box" id="confirm-box">
    <div class="icon">📧</div>
    <p>Enviamos un email de confirmación a<br><strong id="confirm-email"></strong><br><br>Abrilo y tocá el enlace para activar tu cuenta. Luego podrás ingresar al panel.</p>
  </div>

  <div class="loader" id="loader"></div>
  <div class="error-msg" id="err"></div>

  <div class="divider">¿ya tenés cuenta?</div>

  <button class="btn-email" onclick="location.href='/login.html'">Ingresar →</button>

  <p class="note">
    Despues de registrarte completaras tus datos desde el panel.
  </p>
</div>

<script type="module">
import { supabase as sb } from '../assets/js/config.js';
import { iniciarLoginGoogleNativo, escucharCallbackOAuthNativo } from '../assets/js/auth-service.js';

const base = window.BACKEND_URL ?? '';

// En la app nativa, Google vuelve acá vía deep link (no vía redirectTo normal)
escucharCallbackOAuthNativo(() => { window.location.href = '/cadete/cadete.html'; });

function mostrarErr(msg) {
  const el = document.getElementById('err');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function ocultarErr() {
  const el = document.getElementById('err');
  if (el) el.style.display = 'none';
}
function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
  document.getElementById('btn-google').disabled = on;
  document.getElementById('btn-registrar').disabled = on;
}

window.loginConGoogle = async function() {
  const chk = document.getElementById('chk-tyc-cadete');
  if (chk && !chk.checked) { mostrarErr('Debes aceptar los terminos y condiciones.'); return; }
  ocultarErr();
  localStorage.setItem('pap_tyc_aceptados', new Date().toISOString());
  localStorage.setItem('pap_pending_role', 'cadete');
  setLoading(true);
  try {
    await iniciarLoginGoogleNativo('/cadete/cadete.html');
  } catch (e) {
    mostrarErr('Error: ' + (e.message || 'Intentá de nuevo.'));
    setLoading(false);
  }
};

window.registrarConEmail = async function() {
  const chk = document.getElementById('chk-tyc-cadete');
  if (chk && !chk.checked) { mostrarErr('Debes aceptar los terminos y condiciones.'); return; }
  ocultarErr();

  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const pass2 = document.getElementById('inp-pass2').value;

  if (!email) { mostrarErr('Ingresá tu email.'); return; }
  if (pass.length < 6) { mostrarErr('La contraseña debe tener al menos 6 caracteres.'); return; }
  if (pass !== pass2) { mostrarErr('Las contraseñas no coinciden.'); return; }

  localStorage.setItem('pap_tyc_aceptados', new Date().toISOString());
  localStorage.setItem('pap_pending_role', 'cadete');
  setLoading(true);

  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password: pass,
      options: {
        data: { pending_role: 'cadete' },
        emailRedirectTo: window.location.origin + '/cadete/registro-cadete.html',
      },
    });
    if (error) throw error;

    if (data.session) {
      // Sin confirmación de email — asignar rol directamente
      const resp = await fetch(`${base}/api/auth/set-role`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${data.session.access_token}` },
        body: JSON.stringify({ role: 'cadete' }),
      });
      if (resp.ok) {
        localStorage.removeItem('pap_pending_role');
        location.replace('cadete.html');
        return;
      }
      const body = await resp.json().catch(() => ({}));
      mostrarErr('Cuenta creada, pero no se pudo asignar el rol: ' + (body.error || `error ${resp.status}`) + '. Intentá de nuevo.');
    } else {
      // Email de confirmación enviado
      document.getElementById('email-form').style.display = 'none';
      const cb = document.getElementById('confirm-box');
      document.getElementById('confirm-email').textContent = email;
      cb.style.display = 'block';
    }
  } catch (e) {
    if (e.message?.toLowerCase().includes('already registered')) {
      mostrarErr('Ese email ya está registrado. Ingresá desde "Ingresar →".');
    } else {
      mostrarErr(e.message || 'Error al registrarse. Intentá de nuevo.');
    }
  }
  setLoading(false);
};

// Volvió de confirmar email o de Google OAuth
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user) return;

    const user = session.user;
    const pendingRole = localStorage.getItem('pap_pending_role') || user.user_metadata?.pending_role;

    if (pendingRole === 'cadete') {
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btn-google');
      if (loader) loader.style.display = 'flex';
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`${base}/api/auth/set-role`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({ role: 'cadete' }),
        });
        if (resp.ok) {
          localStorage.removeItem('pap_pending_role');
          location.replace('cadete.html');
          return;
        }
        const body = await resp.json().catch(() => ({}));
        mostrarErr('No se pudo asignar el rol de cadete: ' + (body.error || `error ${resp.status}`) + '. Intentá de nuevo.');
      } catch (e) {
        mostrarErr('Error de conexión al asignar rol. Verificá tu red e intentá de nuevo.');
      }
      if (loader) loader.style.display = 'none';
      if (btn) btn.disabled = false;
      return;
    }

    // Ya tiene sesión activa como cadete → ir al panel
    const role = user.user_metadata?.role;
    if (role === 'cadete') { location.replace('cadete.html'); return; }
    try {
      const { data: perfil } = await sb.from('perfiles').select('rol').eq('usuario_id', user.id).maybeSingle();
      if (perfil?.rol === 'cadete') { location.replace('cadete.html'); }
    } catch {}
  } catch {}
})();
</script>
</body>
</html>
